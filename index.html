---
layout: default
---

<style>
    /* CSS 특수성을 최대로 높여 Waline 기본 스타일이 덮어쓰지 못하도록 강제 차단합니다. */
    body .posts-list .waline-wrapper .wl-meta-head,
    body .posts-list .waline-wrapper .wl-header,
    body .posts-list .waline-wrapper .wl-sort,
    body .posts-list .waline-wrapper .wl-refresh,
    body .posts-list .waline-wrapper button[title="새로고침"],
    body .posts-list .waline-wrapper .wl-count,
    body .posts-list .waline-wrapper .wl-cards,
    body .posts-list .waline-wrapper .wl-empty,
    body .posts-list .waline-wrapper .wl-pagination,
    body .posts-list .waline-wrapper .wl-power {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        pointer-events: none !important;
    }
</style>

<div class="posts-list">
    {% for post in paginator.posts %}
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
            <div class="meta">
                {% if post.category %}
                <a class="entryCategory" href="{{ post.url | relative_url }}">{{ post.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ post.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ post.content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="toggleWaline(event, '{{ forloop.index }}', '{{ post.url | relative_url }}')">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <!-- Waline 컨테이너 -->
        <div id="waline-wrapper-{{ forloop.index }}" class="waline-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="waline-{{ forloop.index }}"></div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Waline 초기화 스크립트 -->
<script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    window.toggleWaline = function(event, index, path) {
        event.preventDefault();
        var container = document.getElementById('waline-wrapper-' + index);
        
        if (container.style.display === "block") {
            container.style.display = "none";
        } else {
            // 다른 창 닫기
            document.querySelectorAll('.waline-wrapper').forEach(el => el.style.display = "none");
            container.style.display = "block";
            
            // 초기화 (한 번만 실행)
            if (!container.dataset.initialized) {
                init({
                    el: '#waline-' + index,
                    serverURL: 'https://nutmeg-eight.vercel.app',
                    path: path,
                    emoji: false,
                    requiredMeta: ['nick'],
                    login: 'disable',
                    noCopyright: true, 
                    noRss: true        
                });
                container.dataset.initialized = 'true';
            }
        }
    };
</script>
