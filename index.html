---
layout: default
---

<div class="posts-list">
    {% for post in paginator.posts %}
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
            <div class="meta">
                {% if post.category %}
                <a class="entryCategory" href="{{ post.url | relative_url }}">{{ post.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ post.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ post.content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="toggleCusdis(event, '{{ forloop.index }}')">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="cusdis-wrapper-{{ forloop.index }}" class="cusdis-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="cusdis_thread"
                 data-host="https://cusdis.com"
                 data-app-id="99a4e3fa-79ee-471a-82da-0b8214bc1fc4"
                 data-page-id="{{ post.url | relative_url }}"
                 data-page-url="{{ site.url }}{{ post.url | relative_url }}"
                 data-page-title="{{ post.title | escape }}"
                 data-theme="light">
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

<script>
function toggleCusdis(event, index) {
    event.preventDefault();
    
    // 현재 클릭한 포스트의 래퍼만 타겟팅
    var wrapper = document.getElementById('cusdis-wrapper-' + index);
    if (!wrapper) return;

    // display 토글만 수행 (innerHTML을 절대 건드리지 않음 -> 사라짐 방지)
    if (wrapper.style.display === "block") {
        wrapper.style.display = "none";
    } else {
        // 모든 다른 댓글창을 닫고 하나만 엽니다
        var allWrappers = document.querySelectorAll('.cusdis-wrapper');
        for (var i = 0; i < allWrappers.length; i++) {
            allWrappers[i].style.display = "none";
        }
        wrapper.style.display = "block";
    }
}
</script>
