---
layout: default
---

<div class="posts-list">
    {% for post in paginator.posts %}
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
            <div class="meta">
                {% if post.category %}
                <a class="entryCategory" href="{{ post.url | relative_url }}">{{ post.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ post.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ post.content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="toggleCusdis(event, '{{ post.title | escape }}', '{{ post.url | relative_url }}', 'cusdis-container-{{ forloop.index }}')">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="cusdis-container-{{ forloop.index }}" class="comment" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;"></div>
    </div>
    {% endfor %}
</div>

<script>
function toggleCusdis(event, postTitle, postUrl, containerId) {
    event.preventDefault();
    var container = document.getElementById(containerId);
    if (!container) return;

    if (container.style.display === "block") {
        container.style.display = "none";
        container.innerHTML = "";
        return;
    }

    // 다른 모든 댓글창 닫기
    var allContainers = document.querySelectorAll('.comment');
    for (var i = 0; i < allContainers.length; i++) {
        allContainers[i].style.display = "none";
        allContainers[i].innerHTML = "";
    }

    container.style.display = "block";
    
    // Cusdis 기본 로드
    var thread = document.createElement('div');
    thread.id = 'cusdis_thread';
    thread.setAttribute('data-host', 'https://cusdis.com');
    thread.setAttribute('data-app-id', 'bafad7eb-3b56-49d3-92de-f0212c4d5091'); 
    thread.setAttribute('data-page-id', postUrl);
    thread.setAttribute('data-page-url', '{{ site.url }}' + postUrl);
    thread.setAttribute('data-page-title', postTitle);
    thread.setAttribute('data-theme', 'light');
    
    container.appendChild(thread);
    
    var script = document.createElement('script');
    script.src = 'https://cusdis.com/js/cusdis.es.js';
    script.async = true;
    container.appendChild(script);
}
</script>
