---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostCusdis(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-cusdis-root" class="cusdis-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="cusdis_thread_detail"
                 data-host="https://cusdis.com"
                 data-app-id="99a4e3fa-79ee-471a-82da-0b8214bc1fc4"
                 data-page-id="{{ page.url }}"
                 data-page-url="{{ site.url }}{{ page.url }}"
                 data-page-title="{{ page.title | escape }}">
            </div>
        </div>
    </div>
</div>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

<script>
function togglePostCusdis(event) {
    event.preventDefault();
    
    var container = document.getElementById('post-cusdis-root');
    if (!container) return;

    // 1. 이미 열려있다면 숨깁니다.
    if (container.style.display === "block") {
        container.style.display = "none";
        return;
    }

    // 2. 영역을 먼저 열어 브라우저에 너비/높이를 인지시킵니다.
    container.style.display = "block";
    
    // 3. 그 즉시 Cusdis 엔진에 명령하여 강제로 댓글창 프레임을 그리게 만듭니다.
    if (window.CUSDIS && typeof window.CUSDIS.renderId === 'function') {
        var threadEl = document.getElementById('cusdis_thread_detail');
        if (threadEl) {
            window.CUSDIS.renderId(threadEl);
        }
    }
}
</script>

<style>
/* dari.tistory.com 감성의 깔끔한 직각 모서리 스타일 보존 */
.cusdis-wrapper iframe {
    border-radius: 0px !important;
}
</style>
