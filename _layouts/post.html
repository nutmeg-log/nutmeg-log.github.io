---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostCusdis(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <!-- 상세 페이지용 Cusdis 익명댓글 컨테이너 -->
        <div id="post-cusdis-root" class="comment" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;"></div>
    </div>
</div>

<script>
// adari.tistory.com의 심플하고 각진 정형화된 댓글창 CSS 정의
var cusdisCustomCSS = `
    body { font-family: 'Pretendard', sans-serif !important; font-size: 13px !important; color: #555 !important; }
    input, textarea { 
        font-family: 'Pretendard', sans-serif !important; 
        border: 1px solid #eee !important; 
        border-radius: 0px !important; /* 모서리 각지게 */
        background-color: #fff !important; 
        font-size: 13px !important; 
        padding: 8px 12px !important;
        outline: none !important;
    }
    input:focus, textarea:focus { border-color: #ccc !important; }
    button[type="submit"] { 
        border: 1px solid #eee !important; 
        border-radius: 0px !important; 
        background: transparent !important; 
        color: #555 !important; 
        font-size: 12px !important; 
        padding: 6px 15px !important; 
        cursor: pointer !important;
        transition: all 0.3s ease !important;
    }
    button[type="submit"]:hover { 
        background: #f7f7f7 !important; 
        color: #000 !important; 
    }
    .cusdis-comment-meta { font-size: 11px !important; color: #aaa !important; }
    .cusdis-comment-content { font-size: 13px !important; line-height: 1.6 !important; color: #444 !important; }
`;

function togglePostCusdis(event) {
    event.preventDefault();
    
    var container = document.getElementById('post-cusdis-root');
    if (!container) return;

    if (container.style.display === "block") {
        container.style.display = "none";
        return;
    }

    if (container.innerHTML === "") {
        var thread = document.createElement('div');
        thread.id = 'cusdis_thread';
        thread.setAttribute('data-host', 'https://cusdis.com');
        thread.setAttribute('data-app-id', '99a4e3fa-79ee-471a-82da-0b8214bc1fc4'); // 대시보드에서 가져오신 ID를 넣어주세요.
        thread.setAttribute('data-page-id', '{{ page.url }}');
        thread.setAttribute('data-page-url', window.location.href);
        thread.setAttribute('data-page-title', '{{ page.title | escape }}');
        thread.setAttribute('data-theme', 'light');
        
        // CSS 주입 기능 사용
        thread.setAttribute('data-iframe-css', 'data:text/css;base64,' + btoa(unescape(encodeURIComponent(cusdisCustomCSS))));
        
        container.appendChild(thread);

        var script = document.createElement('script');
        script.src = 'https://cusdis.com/js/cusdis.es.js';
        script.async = true;
        script.defer = true;
        container.appendChild(script);
    }

    container.style.display = "block";
}
</script>
