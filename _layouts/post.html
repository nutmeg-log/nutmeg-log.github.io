---
layout: default
---

<style>
    /* Waline v3의 하단 목록, 정렬(최신순/인기순), 새로고침 등을 구성하는 모든 영역을 안전하게 숨깁니다. */
    .waline-wrapper .wl-header,        /* 헤더 영역 (새로고침, 정렬 등 포함) */
    .waline-wrapper .wl-list-header,   /* v3 목록 헤더 */
    .waline-wrapper .wl-meta-head,     /* 메타 헤더 */
    .waline-wrapper .wl-sort,          /* 최신순, 오래된순, 인기순 */
    .waline-wrapper .wl-refresh,       /* 새로고침 버튼 */
    .waline-wrapper .wl-count,         /* 댓글 개수 */
    .waline-wrapper .wl-cards,         /* 실제 댓글 목록 */
    .waline-wrapper .wl-empty,         /* '댓글이 없습니다' 텍스트 */
    .waline-wrapper .wl-pagination,    /* 페이지네이션 */
    .waline-wrapper .wl-power {        /* Powered by Waline */
        display: none !important;
    }
</style>

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostWaline(event, '{{ page.url | relative_url }}')">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-waline-wrapper" class="waline-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="post-waline"></div>
        </div>
    </div>
</div>

<script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    window.togglePostWaline = function(event, path) {
        event.preventDefault();
        var container = document.getElementById('post-waline-wrapper');
        
        if (container.style.display === "block") {
            container.style.display = "none";
        } else {
            container.style.display = "block";
            if (!container.dataset.initialized) {
                init({
                    el: '#post-waline',
                    serverURL: 'https://nutmeg-eight.vercel.app',
                    path: path,
                    emoji: false,
                    requiredMeta: ['nick'],
                    login: 'disable',
                    noCopyright: true, 
                    noRss: true        
                });
                container.dataset.initialized = 'true';
            }
        }
    };
</script>
