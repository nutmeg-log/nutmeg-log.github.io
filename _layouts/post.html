---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="comments-wrapper" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
            <script src="https://giscus.app/client.js"
                    data-repo="[ENTER REPO HERE]"
                    data-repo-id="[ENTER REPO ID HERE]"
                    data-category="[ENTER CATEGORY HERE]"
                    data-category-id="[ENTER CATEGORY ID HERE]"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="preferred_color_scheme"
                    data-lang="ko"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
        </div>
</div>
