---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <!-- 댓글 토글 버튼 -->
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="toggleWaline(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <!-- Waline 댓글창 컨테이너 (초기엔 숨김) -->
        <div id="waline-container" class="comment" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="waline"></div>
        </div>
    </div>
</div>

<!-- Waline 스크립트 및 CSS -->
<link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />

<script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    // Waline 초기화
    init({
        el: '#waline',
        serverURL: '여기에_방금_복사한_Vercel_도메인_주소를_넣으세요', // 예: https://nutmeg-blog.vercel.app
        emoji: false,
        requiredMeta: ['nick'],
        login: 'disable' // 익명 댓글 허용
    });

    // 기존 토글 기능을 활용한 표시/숨김 함수
    window.toggleWaline = function(event) {
        event.preventDefault();
        var container = document.getElementById('waline-container');
        if (!container) return;

        if (container.style.display === "block") {
            container.style.display = "none";
        } else {
            container.style.display = "block";
        }
    };
</script>

<style>
/* adari.tistory.com 스타일 유지: 직각 모서리 강제 적용 */
:root {
    --waline-border-radius: 0px !important;
    --waline-avatar-radius: 0px !important;
}
.comment {
    border-radius: 0px !important;
}
</style>
