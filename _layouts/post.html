---
layout: default
---

<style>
    /* CSS 특수성을 최대로 높여 Waline 기본 스타일이 덮어쓰지 못하도록 강제 차단합니다. */
    body .posts-list .waline-wrapper .wl-meta-head,
    body .posts-list .waline-wrapper .wl-header,
    body .posts-list .waline-wrapper .wl-sort,
    body .posts-list .waline-wrapper .wl-refresh,
    body .posts-list .waline-wrapper button[title="새로고침"],
    body .posts-list .waline-wrapper .wl-count,
    body .posts-list .waline-wrapper .wl-cards,
    body .posts-list .waline-wrapper .wl-empty,
    body .posts-list .waline-wrapper .wl-pagination,
    body .posts-list .waline-wrapper .wl-power {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        pointer-events: none !important;
    }
</style>

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostWaline(event, '{{ page.url | relative_url }}')">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-waline-wrapper" class="waline-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="post-waline"></div>
        </div>
    </div>
</div>

<script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    window.togglePostWaline = function(event, path) {
        event.preventDefault();
        var container = document.getElementById('post-waline-wrapper');
        
        if (container.style.display === "block") {
            container.style.display = "none";
        } else {
            container.style.display = "block";
            if (!container.dataset.initialized) {
                init({
                    el: '#post-waline',
                    serverURL: 'https://nutmeg-eight.vercel.app',
                    path: path,
                    emoji: false,
                    requiredMeta: ['nick'],
                    login: 'disable',
                    noCopyright: true, 
                    noRss: true        
                });
                container.dataset.initialized = 'true';
            }
        }
    };
</script>
