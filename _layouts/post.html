---
layout: default
---

<div class="post-wrapper">
    <div class="post-header">
        <h2>{{ page.title }}</h2>
        <div class="post-meta">
            {% if page.category %}
            <span class="entryCategory">{{ page.category }}</span>
            {% endif %}
            <span class="date">
                {{ page.date | date: "%B %d, %Y" }}
            </span>
        </div>
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    {% if page.tags.size > 0 %}
    <ul class="post-tags">
        {% for tag in page.tags %}
        <li><a href="{{ '/tags/#' | append: tag | relative_url }}">{{ tag }}</a></li>
        {% endfor %}
    </ul>
    {% endif %}

    <div class="comment" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        <h3 style="font-size: 13px; font-weight: bold; margin-bottom: 15px;">Comments</h3>
        <script src="https://utteranc.es/client.js"
                repo="nutmeg-log/nutmeg-log.github.io"
                issue-term="pathname"
                theme="github-light"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>
