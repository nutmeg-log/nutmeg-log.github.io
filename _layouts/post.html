---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostGiscus(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-giscus-root" class="comment" style="margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;"></div>
    </div>
</div>

<script>
function togglePostGiscus(event) {
    event.preventDefault();
    
    var container = document.getElementById('post-giscus-root');
    if (!container) return;

    if (container.style.display === "block") {
        container.style.display = "none";
        return;
    }

    if (container.innerHTML === "") {
        var script = document.createElement('script');
        script.setAttribute('src', 'https://giscus.app/client.js');
        script.setAttribute('data-repo', 'nutmeg-log/nutmeg-log.github.io');
        script.setAttribute('data-repo-id', 'R_kgDONG641g');
        script.setAttribute('data-category', 'Announcements');
        script.setAttribute('data-category-id', 'DIC_kwDONG641s4CkWzB');
        script.setAttribute('data-mapping', 'specific');
        script.setAttribute('data-term', '{{ page.title | escape }}');
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'top');
        script.setAttribute('data-theme', 'light');
        script.setAttribute('data-lang', 'ko');
        script.setAttribute('crossorigin', 'anonymous');
        script.setAttribute('async', 'true');
        
        container.appendChild(script);
    }

    container.style.display = "block";
}
</script>
