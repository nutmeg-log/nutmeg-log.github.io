---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="titleWrap">
            <h2>{{ page.title }}</h2>
            <div class="meta">
                {% if page.category %}
                <a class="entryCategory" href="{{ site.baseurl }}/category/{{ page.category | slugify }}">{{ page.category }}</a> 
                {% endif %}
                <span class="date">
                    {{ page.date | date: "%B %d, %Y" }}
                </span>
            </div>
        </div>
        
        <div class="article">
            {{ content }}
        </div>
        
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostCusdis(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-cusdis-root" class="comment" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;"></div>
    </div>
</div>

<script>
function togglePostCusdis(event) {
    event.preventDefault();
    var container = document.getElementById('post-cusdis-root');
    if (!container) return;

    if (container.style.display === "block") {
        container.style.display = "none";
        container.innerHTML = "";
        return;
    }

    container.style.display = "block";
    
    var thread = document.createElement('div');
    thread.id = 'cusdis_thread';
    thread.setAttribute('data-host', 'https://cusdis.com');
    thread.setAttribute('data-app-id', 'bafad7eb-3b56-49d3-92de-f0212c4d5091');
    thread.setAttribute('data-page-id', '{{ page.url | relative_url }}');
    thread.setAttribute('data-page-url', '{{ site.url }}{{ page.url | relative_url }}');
    thread.setAttribute('data-page-title', '{{ page.title | escape }}');
    thread.setAttribute('data-theme', 'light');
    
    container.appendChild(thread);
    
    var script = document.createElement('script');
    script.src = 'https://cusdis.com/js/cusdis.es.js';
    script.async = true;
    container.appendChild(script);
}
</script>
