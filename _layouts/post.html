---
layout: default
---

<div class="posts-list">
    <div class="mainElement entry">
        <div class="actionTrail" style="cursor: pointer;">
            <i class="fa fa-fw fa-comment"></i> 
            <a href="#" onclick="togglePostCusdis(event)">
                <span class="cnt">comment</span>
            </a>
        </div>
        
        <div id="post-cusdis-wrapper" class="cusdis-wrapper" style="display: none; margin-top: 20px; padding: 20px 0; border-top: 1px solid #eee;">
            <div id="cusdis_thread"
                 data-host="https://cusdis.com"
                 data-app-id="bafad7eb-3b56-49d3-92de-f0212c4d5091"
                 data-page-id="{{ page.url | relative_url }}"
                 data-page-url="{{ site.url }}{{ page.url | relative_url }}"
                 data-page-title="{{ page.title | escape }}"
                 data-theme="light">
            </div>
        </div>
    </div>
</div>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

<script>
function togglePostCusdis(event) {
    event.preventDefault();
    var wrapper = document.getElementById('post-cusdis-wrapper');
    if (!wrapper) return;
    
    // display 토글만 수행
    if (wrapper.style.display === "block") {
        wrapper.style.display = "none";
    } else {
        wrapper.style.display = "block";
    }
}
</script>
