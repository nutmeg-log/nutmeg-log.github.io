<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <!-- 폰트 및 아이콘 라이브러리 -->
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 캐시 방지 파라미터 적용하여 style.css 연결 -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
</head>
<body>

<div id="container">
    <!-- 1. 왼쪽 사이드바 영역 -->
    <aside id="sidebar">
        <h1 class="blog-title"><a href="{{ '/' | relative_url }}">Nutmeg Log</a></h1>
        <nav id="menu">
            <ul>
                <li><a href="{{ '/' | relative_url }}"><i class="fa fa-bars"></i> <span>View All</span></a></li>
                <li><a href="{{ '/category/memo/' | relative_url }}"><i class="fa fa-pencil"></i> <span>Memo</span></a></li>
                <li><a href="{{ '/category/movie/' | relative_url }}"><i class="fa fa-star"></i> <span>Movie</span></a></li>
                <li><a href="{{ '/tags/' | relative_url }}"><i class="fa fa-tag"></i> <span>Tag</span></a></li>
            </ul>
        </nav>
        
        <!-- 사이드바 내부에 포함된 검색창 -->
        <div class="search-box">
            <div class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" id="search-input" placeholder="검색어를 입력하세요.">
            </div>
            <ul id="results-container"></ul>
        </div>
    </aside>

    <!-- 2. 오른쪽 본문 영역 (본문 + 하단 푸터 통합) -->
    <div id="content-wrapper">
        <main id="content">
            {{ content }}
        </main>

        <!-- 우측 하단 푸터 영역 (댓글창 밑에 아주 깔끔하게 안착) -->
        <footer id="footer">
            <div class="footer-meta">
                <span class="top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" style="cursor:pointer;">Top</span>
                <p class="copyright">
                    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>. Powered by Jekyll
                </p>
            </div>
        </footer>
    </div>
</div> 

</body>
</html>
