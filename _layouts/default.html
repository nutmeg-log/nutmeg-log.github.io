<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
</head>
<body>

<div id="container">
    <aside id="sidebar">
        <h1 class="blog-title">
            <a href="{{ '/' | relative_url }}">Nutmeg Log</a>
        </h1>
        
        <nav id="menu">
            <ul>
                <li class="menu-item">
                    <a href="{{ '/' | relative_url }}">분류 전체보기 <span class="c_cnt">({{ site.posts.size }})</span></a>
                </li>
                <li class="menu-item sub-item">
                    <a href="{{ '/category/memo/' | relative_url }}">Memo <span class="c_cnt">({{ site.categories['memo'].size | default: 0 }})</span></a>
                </li>
                <li class="menu-item sub-item">
                    <a href="{{ '/category/movie/' | relative_url }}">Movie <span class="c_cnt">({{ site.categories['movie'].size | default: 0 }})</span></a>
                </li>
                <li class="menu-item sub-item">
                    <a href="{{ '/tags/' | relative_url }}">Tag</a>
                </li>
            </ul>
        </nav>
        
        <div class="search-box">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="블로그 내 검색">
            </div>
            <ul id="results-container"></ul>
        </div>
    </aside>

    <div id="content-wrapper">
        <main id="content">
            {{ content }}
        </main>

        <footer id="footer">
            <div class="footer-meta">
                <span class="top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">Top</span>
                <p class="copyright">
                    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>. Powered by Jekyll
                </p>
            </div>
        </footer>
    </div>
</div> 

</body>
</html>
