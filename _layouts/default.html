<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <!-- 폰트 및 아이콘 라이브러리 -->
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS 파일 연결 (캐시 방지 파라미터 적용) -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
</head>
<body>

<div id="container">
    <!-- 상단 헤더 영역 (티스토리 스타일의 미니멀 로고 및 가로 메뉴) -->
    <header id="header">
        <h1 class="blog-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <nav id="top-menu">
            <ul>
                <li><a href="{{ '/' | relative_url }}"><i class="fa fa-bars"></i> <span>View All</span></a></li>
                <li><a href="{{ '/category/memo/' | relative_url }}"><i class="fa fa-pencil"></i> <span>Memo</span></a></li>
                <li><a href="{{ '/category/movie/' | relative_url }}"><i class="fa fa-star"></i> <span>Movie</span></a></li>
                <li><a href="{{ '/tags/' | relative_url }}"><i class="fa fa-tag"></i> <span>Tag</span></a></li>
            </ul>
        </nav>
    </header>

    <!-- 메인 본문 콘텐츠 영역 (1단 중앙 정렬) -->
    <main id="content">
        {{ content }}
    </main>

    <!-- 하단 영역 (티스토리형 밑줄 검색창 + 푸터) -->
    <footer id="footer">
        <div class="search-box">
            <div class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" id="search-input" placeholder="검색어를 입력하세요.">
            </div>
            <ul id="results-container"></ul>
        </div>
        
        <div class="footer-meta">
            <span class="top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" style="cursor:pointer;">Top</span>
            <p class="copyright">
                <a href="{{ '/' | relative_url }}">{{ site.title }}</a><br>
                Skin by Ena / Converted to Jekyll
            </p>
        </div>
    </footer>
</div> 

</body>
</html>
