<!DOCTYPE HTML>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.3.0/css/font-awesome.min.css">
<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
<link rel="stylesheet" media="screen" type="text/css" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">

<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.js"></script>
<script>
$(document).ready(function() {
    // 본문 data-ke-size 속성 제거
    $(".article h1, .article h2, .article h3, .article h4, .article p").removeAttr("data-ke-size");
});
</script>
</head>
<body>
<div id="container">
  <div id="header">
    </div>
  <div id="wrap">
    <div id="sidebar">
      <ul id="menu">
        <li><a href="{{ '/' | relative_url }}"><i class="fa fa-fw fa-bars"></i><span>View All</span></a></li>
        <li><a href="{{ '/category/memo' | relative_url }}"><i class="fa fa-fw fa-pencil"></i><span>Memo</span></a></li>
        <li><a href="{{ '/category/movie' | relative_url }}"><i class="fa fa-fw fa-star"></i><span>Movie</span></a></li>
        <li><a href="{{ '/tags' | relative_url }}"><i class="fa fa-fw fa-tag"></i><span>Tag</span></a></li>
        <li><a href="{{ '/guestbook' | relative_url }}"><i class="fa fa-fw fa-heart"></i><span>Guestbook</span></a></li>
      </ul>
      <div id="search"> 
        <input type="text" id="search-input" placeholder="Search" />
        <input value="&#xF002;" type="button" class="submit"/>
        <ul id="results-container" style="padding:0; list-style:none;"></ul>
      </div>
    </div>
    
    <div id="content">
      {{ content }}
    </div>
  </div>
  
  <div id="footer">
    <span class="top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" style="cursor:pointer;">Top</span>
    <p class="copyright">
      <a href="{{ '/' | relative_url }}">NUTMEG</a><br>
      <a href="http://jquery.com" target="_blank">jQuery</a> | <a href="http://fortawesome.github.io/Font-Awesome/" target="_blank">Font Awesome</a> | Skin by Ena
    </p>
  </div>
</div> 
</body>
</html>
